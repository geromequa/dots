source = ~/.config/themes/current/hyprlock.conf

background {
    monitor =
    color = $color
    path = ~/.config/themes/current/backgrounds/1-nord.png # "cmd find ~/.config/themes/current/backgrounds -type f | head -n 1"
    blur_passes = 3
}

animations {
    enabled = true
}

input-field {
    monitor =
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    check_color = $check_color
    fade_on_empty = true
    placeholder_text = Enter Password
    font_family = SF Pro Display Bold
    position = 0,0
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = true
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $font_color
    font_size = 100
    font_family = SF Pro Display Bold
    position = 0, 210
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = $font_color
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 110
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] /bin/zsh -c 'cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed "s/$/%/" || echo ""'
    color = $font_color
    font_size = 16
    font_family = SF Pro Display Bold
    position = -50, 30
    halign = right
    valign = bottom
}
